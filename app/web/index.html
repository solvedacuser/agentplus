<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="강의 PDF를 기반으로 개념 설명, 예상문제 생성, 답안 채점을 도와주는 FastAPI 시험공부 코치 Agent"
    />
    <title>Lecture Exam Coach Agent</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23050807'/%3E%3Cpath d='M18 18h28v28H18z' fill='none' stroke='%2334d399' stroke-width='5'/%3E%3Cpath d='M25 28h14M25 37h10' stroke='%23effcf7' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js" defer></script>
  </head>
  <body>
    <div class="noise-layer" aria-hidden="true"></div>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <span class="brand-mark" aria-hidden="true">
            <iconify-icon icon="solar:notebook-bookmark-linear"></iconify-icon>
          </span>
          <div>
            <p class="eyebrow">FastAPI Agent Dashboard</p>
            <h1>시험공부 코치 Agent</h1>
          </div>
        </div>

        <div class="top-actions">
          <div class="status-group" aria-live="polite">
            <span id="healthDot" class="status-dot"></span>
            <span id="healthText">서버 상태 확인 중</span>
          </div>
          <a href="/docs" class="docs-link">
            <span>API 문서</span>
            <iconify-icon icon="solar:arrow-right-up-linear" aria-hidden="true"></iconify-icon>
          </a>
        </div>
      </header>

      <main class="dashboard" aria-label="시험공부 코치 작업 영역">
        <aside class="context-panel panel-shell" aria-labelledby="contextTitle">
          <div class="panel-core">
            <div class="panel-heading compact">
              <div>
                <p class="eyebrow">Study Context</p>
                <h2 id="contextTitle">학습 세션</h2>
              </div>
              <span class="panel-icon" aria-hidden="true">
                <iconify-icon icon="solar:bookmark-opened-linear"></iconify-icon>
              </span>
            </div>

            <div class="action-grid">
              <button id="indexButton" class="primary-action" type="button">
                <span class="button-icon" aria-hidden="true">
                  <iconify-icon icon="solar:database-linear"></iconify-icon>
                </span>
                <span>PDF 인덱싱</span>
              </button>
              <button id="sessionButton" class="secondary-action" type="button">
                <span class="button-icon" aria-hidden="true">
                  <iconify-icon icon="solar:refresh-linear"></iconify-icon>
                </span>
                <span>세션 불러오기</span>
              </button>
            </div>

            <div id="notice" class="notice" aria-live="polite">
              PDF를 먼저 인덱싱하면 개념 설명과 예상문제 생성에 강의 자료 근거가 반영됩니다.
            </div>

            <section class="summary-section" aria-labelledby="summaryTitle">
              <div class="section-title-row">
                <h3 id="summaryTitle">세션 상태</h3>
                <span class="mini-label">memory</span>
              </div>
              <dl class="state-list">
                <div>
                  <dt>최근 질문</dt>
                  <dd id="recentQuestion">-</dd>
                </div>
                <div>
                  <dt>최근 답안</dt>
                  <dd id="recentAnswer">-</dd>
                </div>
                <div>
                  <dt>취약 태그</dt>
                  <dd id="weaknessTags">-</dd>
                </div>
              </dl>
            </section>

            <section class="summary-section" aria-labelledby="quizTitle">
              <div class="section-title-row">
                <h3 id="quizTitle">최근 예상문제</h3>
                <span class="mini-label">quiz</span>
              </div>
              <pre id="recentQuiz" class="json-view">-</pre>
            </section>

            <section class="summary-section" aria-labelledby="gradeTitle">
              <div class="section-title-row">
                <h3 id="gradeTitle">채점 결과</h3>
                <span class="mini-label">grade</span>
              </div>
              <pre id="gradingResults" class="json-view">-</pre>
            </section>
          </div>
        </aside>

        <section class="chat-panel panel-shell" aria-labelledby="chatTitle">
          <div class="panel-core chat-core">
            <div class="panel-heading">
              <div>
                <p class="eyebrow">Agent Chat</p>
                <h2 id="chatTitle">강의 자료 기반 학습 대화</h2>
              </div>
              <button id="clearChatButton" class="ghost-button" type="button" title="대화 지우기" aria-label="대화 지우기">
                <iconify-icon icon="solar:trash-bin-minimalistic-linear" aria-hidden="true"></iconify-icon>
                <span>지우기</span>
              </button>
            </div>

            <section class="tool-strip" aria-labelledby="availableToolsTitle">
              <div>
                <p class="eyebrow">Prompt Starters</p>
                <h3 id="availableToolsTitle">바로 실행할 학습 요청</h3>
              </div>
              <div class="tool-chip-row">
                <button class="tool-chip" type="button" data-prompt="[PDF 내용]의 개념을 상세하게 설명해줘.">
                  <iconify-icon icon="solar:book-2-linear" aria-hidden="true"></iconify-icon>
                  개념 설명
                </button>
                <button class="tool-chip" type="button" data-prompt="[PDF 내용]을 바탕으로 예상문제 3개 만들어줘.">
                  <iconify-icon icon="solar:clipboard-list-linear" aria-hidden="true"></iconify-icon>
                  예상문제 생성
                </button>
                <button
                  class="tool-chip"
                  type="button"
                  data-prompt="답안 채점:
1번: [내 답안]
2번: [내 답안]
3번: [내 답안]"
                >
                  <iconify-icon icon="solar:checklist-minimalistic-linear" aria-hidden="true"></iconify-icon>
                  답안 채점
                </button>
              </div>
            </section>

            <div id="messageList" class="message-list" aria-live="polite"></div>

            <form id="chatForm" class="composer">
              <label class="composer-field" for="messageInput">
                <span>Agent에게 요청하기</span>
                <textarea
                  id="messageInput"
                  rows="3"
                  placeholder="[PDF 내용] WAN과 LAN의 차이를 시험에 나올 만한 기준으로 정리해줘."
                ></textarea>
              </label>
              <button id="sendButton" class="send-button" type="submit">
                <span>전송</span>
                <span class="send-icon" aria-hidden="true">
                  <iconify-icon icon="solar:arrow-up-linear"></iconify-icon>
                </span>
              </button>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
